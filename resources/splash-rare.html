<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>CCPIT</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: radial-gradient(circle at 50% 50%, #2a1a3e 0%, #1a1a2e 70%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-app-region: drag;
        overflow: hidden;
        position: relative;
      }
      body::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background:
          radial-gradient(circle at 20% 30%, rgba(255, 0, 255, 0.18) 0, transparent 35%),
          radial-gradient(circle at 80% 70%, rgba(0, 255, 255, 0.18) 0, transparent 35%),
          radial-gradient(circle at 50% 90%, rgba(255, 165, 0, 0.12) 0, transparent 30%);
        pointer-events: none;
        animation: drift 9s ease-in-out infinite alternate;
      }
      .logo {
        width: 60%;
        height: auto;
        margin-bottom: 12px;
        animation: fadeIn 0.6s ease-out, glow 2.4s ease-in-out infinite alternate;
        position: relative;
        z-index: 1;
      }
      .subtitle {
        color: rgba(255, 255, 255, 0.6);
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 12px;
        animation: fadeIn 0.8s ease-out;
        position: relative;
        z-index: 1;
        text-shadow: 0 0 6px rgba(255, 0, 255, 0.6);
      }
      .rare-badge {
        color: rgba(255, 215, 0, 0.85);
        font-size: 9px;
        letter-spacing: 4px;
        margin-bottom: 18px;
        animation: rare-pulse 1.2s ease-in-out infinite;
        position: relative;
        z-index: 1;
        text-shadow: 0 0 8px rgba(255, 215, 0, 0.7);
      }
      .loading {
        color: rgba(255, 255, 255, 0.55);
        font-size: 12px;
        letter-spacing: 2px;
        animation: pulse 1.5s ease-in-out infinite;
        position: relative;
        z-index: 1;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
      @keyframes glow {
        from { filter: drop-shadow(0 0 4px rgba(255, 0, 255, 0.35)); }
        to { filter: drop-shadow(0 0 14px rgba(0, 255, 255, 0.55)); }
      }
      @keyframes rare-pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      @keyframes drift {
        from { transform: translate(0, 0); }
        to { transform: translate(8px, -10px); }
      }
    </style>
  </head>
  <body>
    <img class="logo" src="Logo.png" alt="CCPIT" />
    <div class="subtitle">Protocol Interlock Tower</div>
    <div class="rare-badge">✦ RARE ENCOUNTER ✦</div>
    <div class="loading">Loading...</div>
  </body>
</html>
