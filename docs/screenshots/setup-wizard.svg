<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="960" height="640" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="cardShadow3" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="960" height="640" fill="#0a0a0a"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="960" height="32" fill="#161617"/>
  <text x="480" y="20" fill="#a1a1aa" font-size="11" text-anchor="middle">CCPIT — First-time setup</text>
  <!-- Win11 caption buttons (right-aligned) -->
  <g transform="translate(822,0)">
    <rect width="46" height="32" fill="transparent"/>
    <text x="23" y="20" fill="#a1a1aa" font-size="13" text-anchor="middle">−</text>
  </g>
  <g transform="translate(868,0)">
    <rect width="46" height="32" fill="transparent"/>
    <text x="23" y="20" fill="#a1a1aa" font-size="11" text-anchor="middle">□</text>
  </g>
  <g transform="translate(914,0)">
    <rect width="46" height="32" fill="transparent"/>
    <text x="23" y="21" fill="#a1a1aa" font-size="14" text-anchor="middle">×</text>
  </g>

  <!-- Hero text -->
  <text x="480" y="92" fill="#fafafa" font-size="26" font-weight="700" text-anchor="middle">Welcome to CCPIT</text>
  <text x="480" y="120" fill="#a1a1aa" font-size="14" text-anchor="middle">Pick how you want to start. You can change everything later.</text>

  <!-- Step indicator -->
  <g transform="translate(380,150)">
    <circle cx="0" cy="0" r="10" fill="#3b82f6"/>
    <text x="0" y="4" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">1</text>
    <line x1="14" y1="0" x2="86" y2="0" stroke="#3f3f46"/>
    <circle cx="100" cy="0" r="10" fill="#27272a" stroke="#3f3f46"/>
    <text x="100" y="4" fill="#71717a" font-size="11" font-weight="700" text-anchor="middle">2</text>
    <line x1="114" y1="0" x2="186" y2="0" stroke="#3f3f46"/>
    <circle cx="200" cy="0" r="10" fill="#27272a" stroke="#3f3f46"/>
    <text x="200" y="4" fill="#71717a" font-size="11" font-weight="700" text-anchor="middle">3</text>
  </g>
  <text x="380" y="180" fill="#3b82f6" font-size="11" font-weight="600" text-anchor="middle">Choose path</text>
  <text x="480" y="180" fill="#71717a" font-size="11" text-anchor="middle">Configure</text>
  <text x="580" y="180" fill="#71717a" font-size="11" text-anchor="middle">Finish</text>

  <!-- Card: Fresh Start -->
  <g transform="translate(80,220)" filter="url(#cardShadow3)">
    <rect width="380" height="320" rx="14" fill="#1c1c1f" stroke="#3b82f6" stroke-width="2"/>

    <!-- icon -->
    <circle cx="56" cy="60" r="28" fill="#1e3a8a"/>
    <text x="56" y="68" fill="#bfdbfe" font-size="26" text-anchor="middle">⚡</text>

    <text x="100" y="56" fill="#fafafa" font-size="18" font-weight="700">Fresh Start</text>
    <text x="100" y="76" fill="#71717a" font-size="12">Recommended for new users</text>

    <line x1="22" y1="106" x2="358" y2="106" stroke="#27272a"/>

    <text x="22" y="134" fill="#d4d4d8" font-size="13">Lay down a clean configuration:</text>

    <g font-size="12" fill="#a1a1aa">
      <text x="34" y="162">✓ Curated CLAUDE.md template</text>
      <text x="34" y="184">✓ Sensible deny rules and hooks</text>
      <text x="34" y="206">✓ Recommended skills package</text>
      <text x="34" y="228">✓ One Recovery Kit snapshot to roll back</text>
    </g>

    <text x="22" y="262" fill="#71717a" font-size="11">No existing ~/.claude/ files are touched until you confirm.</text>

    <g transform="translate(22,278)">
      <rect width="336" height="34" rx="8" fill="#3b82f6"/>
      <text x="168" y="22" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">Start fresh →</text>
    </g>
  </g>

  <!-- Card: Migration -->
  <g transform="translate(500,220)" filter="url(#cardShadow3)">
    <rect width="380" height="320" rx="14" fill="#1c1c1f" stroke="#27272a"/>

    <!-- icon -->
    <circle cx="56" cy="60" r="28" fill="#3a2e0a"/>
    <text x="56" y="68" fill="#fde68a" font-size="26" text-anchor="middle">🔄</text>

    <text x="100" y="56" fill="#fafafa" font-size="18" font-weight="700">Migrate Existing</text>
    <text x="100" y="76" fill="#71717a" font-size="12">For current Claude Code users</text>

    <line x1="22" y1="106" x2="358" y2="106" stroke="#27272a"/>

    <text x="22" y="134" fill="#d4d4d8" font-size="13">Bring your current ~/.claude/ under management:</text>

    <g font-size="12" fill="#a1a1aa">
      <text x="34" y="162">✓ Detect existing settings.json, rules, skills</text>
      <text x="34" y="184">✓ Backup snapshot saved before any change</text>
      <text x="34" y="206">✓ Conflicts shown side-by-side, you choose</text>
      <text x="34" y="228">✓ Rollback in one click via Recovery Kit</text>
    </g>

    <text x="22" y="262" fill="#71717a" font-size="11">Read-only scan first. Nothing is written without your approval.</text>

    <g transform="translate(22,278)">
      <rect width="336" height="34" rx="8" fill="#27272a"/>
      <text x="168" y="22" fill="#fafafa" font-size="13" font-weight="700" text-anchor="middle">Migrate from existing →</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="480" y="592" fill="#71717a" font-size="11" text-anchor="middle">Tip: re-run setup any time from Settings → Re-run setup.</text>
</svg>
