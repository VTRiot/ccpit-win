<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="cardShadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="800" fill="#0a0a0a"/>

  <!-- Modal backdrop dim -->
  <rect width="1280" height="800" fill="#000" opacity="0.55"/>

  <!-- Maintenance dialog frame -->
  <rect x="120" y="60" width="1040" height="700" rx="14" fill="#15151a" stroke="#27272a" stroke-width="1"/>

  <!-- Dialog header -->
  <text x="148" y="100" fill="#fafafa" font-size="18" font-weight="700">Maintenance</text>
  <text x="148" y="120" fill="#71717a" font-size="12">Advanced configuration and integrations</text>
  <text x="1132" y="100" fill="#a1a1aa" font-size="20" text-anchor="end" font-weight="400">×</text>
  <line x1="148" y1="138" x2="1132" y2="138" stroke="#27272a"/>

  <!-- Tab strip -->
  <g transform="translate(148,154)" font-size="13">
    <g>
      <rect width="92" height="32" rx="6" fill="transparent"/>
      <text x="46" y="21" fill="#a1a1aa" text-anchor="middle">General</text>
    </g>
    <g transform="translate(100,0)">
      <rect width="80" height="32" rx="6" fill="transparent"/>
      <text x="40" y="21" fill="#a1a1aa" text-anchor="middle">CCES</text>
    </g>
    <g transform="translate(188,0)">
      <rect width="140" height="32" rx="6" fill="transparent"/>
      <text x="70" y="21" fill="#a1a1aa" text-anchor="middle">CCES Advanced</text>
    </g>
    <g transform="translate(336,0)">
      <rect width="92" height="32" rx="6" fill="#27272a"/>
      <text x="46" y="21" fill="#fafafa" font-weight="700" text-anchor="middle">🔌 MCP</text>
      <rect y="32" width="92" height="2" fill="#3b82f6"/>
    </g>
    <g transform="translate(436,0)">
      <rect width="120" height="32" rx="6" fill="transparent"/>
      <text x="60" y="21" fill="#a1a1aa" text-anchor="middle">Developer Tools</text>
    </g>
  </g>

  <!-- Subtab bar (Global / Project) -->
  <g transform="translate(148,210)">
    <rect width="240" height="34" rx="8" fill="#1c1c1f"/>
    <rect x="4" y="4" width="116" height="26" rx="6" fill="#27272a"/>
    <text x="62" y="22" fill="#fafafa" font-size="12" font-weight="600" text-anchor="middle">🌐 Global</text>
    <text x="178" y="22" fill="#a1a1aa" font-size="12" text-anchor="middle">📁 Project</text>
  </g>

  <!-- Scope path label -->
  <text x="408" y="232" fill="#71717a" font-size="11">~/.claude.json — applies to all projects</text>

  <!-- Add server button -->
  <g transform="translate(1024,210)">
    <rect width="108" height="34" rx="6" fill="#3b82f6"/>
    <text x="54" y="22" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">+ Add server</text>
  </g>

  <!-- Server cards section header -->
  <text x="148" y="282" fill="#a1a1aa" font-size="11" font-weight="600">CONFIGURED SERVERS (3)</text>

  <!-- Card 1: Safe -->
  <g transform="translate(148,300)" filter="url(#cardShadow2)">
    <rect width="472" height="186" rx="10" fill="#1c1c1f" stroke="#27272a"/>
    <text x="22" y="34" fill="#fafafa" font-size="15" font-weight="700">deepwiki</text>

    <g transform="translate(98,18)">
      <rect width="58" height="22" rx="11" fill="#052e16"/>
      <text x="29" y="15" fill="#22c55e" font-size="10" font-weight="700" text-anchor="middle">SAFE</text>
    </g>

    <text x="22" y="60" fill="#71717a" font-size="11">read-only • no auth • local</text>

    <line x1="22" y1="76" x2="450" y2="76" stroke="#27272a"/>

    <text x="22" y="98" fill="#a1a1aa" font-size="11">command</text>
    <text x="100" y="98" fill="#fafafa" font-size="11" font-family="ui-monospace, monospace">npx -y @anthropic/deepwiki-mcp</text>

    <text x="22" y="120" fill="#a1a1aa" font-size="11">tools</text>
    <text x="100" y="120" fill="#fafafa" font-size="11">read_wiki, ask_question, list_repos</text>

    <text x="22" y="142" fill="#a1a1aa" font-size="11">disabled</text>
    <text x="100" y="142" fill="#71717a" font-size="11">— none —</text>

    <g transform="translate(22,160)">
      <rect width="64" height="20" rx="4" fill="#27272a"/>
      <text x="32" y="14" fill="#d4d4d8" font-size="11" text-anchor="middle">Edit</text>
    </g>
    <g transform="translate(94,160)">
      <rect width="64" height="20" rx="4" fill="#27272a"/>
      <text x="32" y="14" fill="#ef4444" font-size="11" text-anchor="middle">Delete</text>
    </g>
  </g>

  <!-- Card 2: Caution -->
  <g transform="translate(660,300)" filter="url(#cardShadow2)">
    <rect width="472" height="186" rx="10" fill="#1c1c1f" stroke="#27272a"/>
    <text x="22" y="34" fill="#fafafa" font-size="15" font-weight="700">github</text>

    <g transform="translate(70,18)">
      <rect width="78" height="22" rx="11" fill="#3a2e0a"/>
      <text x="39" y="15" fill="#eab308" font-size="10" font-weight="700" text-anchor="middle">CAUTION</text>
    </g>

    <text x="22" y="60" fill="#71717a" font-size="11">PAT auth • read-only by default</text>

    <line x1="22" y1="76" x2="450" y2="76" stroke="#27272a"/>

    <text x="22" y="98" fill="#a1a1aa" font-size="11">command</text>
    <text x="100" y="98" fill="#fafafa" font-size="11" font-family="ui-monospace, monospace">npx -y @modelcontextprotocol/github</text>

    <text x="22" y="120" fill="#a1a1aa" font-size="11">env</text>
    <text x="100" y="120" fill="#fafafa" font-size="11" font-family="ui-monospace, monospace">GITHUB_TOKEN=${GH_PAT}</text>

    <text x="22" y="142" fill="#a1a1aa" font-size="11">disabled</text>
    <text x="100" y="142" fill="#fafafa" font-size="11">create_pr, merge_pr, delete_repo</text>

    <g transform="translate(22,160)">
      <rect width="64" height="20" rx="4" fill="#27272a"/>
      <text x="32" y="14" fill="#d4d4d8" font-size="11" text-anchor="middle">Edit</text>
    </g>
    <g transform="translate(94,160)">
      <rect width="64" height="20" rx="4" fill="#27272a"/>
      <text x="32" y="14" fill="#ef4444" font-size="11" text-anchor="middle">Delete</text>
    </g>
  </g>

  <!-- Card 3: Strict -->
  <g transform="translate(148,500)" filter="url(#cardShadow2)">
    <rect width="984" height="148" rx="10" fill="#1c1c1f" stroke="#27272a"/>
    <text x="22" y="34" fill="#fafafa" font-size="15" font-weight="700">filesystem-write</text>

    <g transform="translate(150,18)">
      <rect width="68" height="22" rx="11" fill="#3a0a0a"/>
      <text x="34" y="15" fill="#ef4444" font-size="10" font-weight="700" text-anchor="middle">STRICT</text>
    </g>

    <text x="232" y="34" fill="#a1a1aa" font-size="11">⚠ Write API detected — disabledTools auto-applied</text>

    <text x="22" y="60" fill="#71717a" font-size="11">filesystem write access • disabled by default</text>

    <line x1="22" y1="76" x2="962" y2="76" stroke="#27272a"/>

    <text x="22" y="98" fill="#a1a1aa" font-size="11">command</text>
    <text x="100" y="98" fill="#fafafa" font-size="11" font-family="ui-monospace, monospace">npx -y @modelcontextprotocol/server-filesystem ~/data</text>

    <text x="22" y="120" fill="#a1a1aa" font-size="11">disabled</text>
    <text x="100" y="120" fill="#ef4444" font-size="11">write_file, edit_file, delete_file, move_file (auto)</text>
  </g>

  <!-- Footer hint -->
  <line x1="148" y1="676" x2="1132" y2="676" stroke="#27272a"/>
  <text x="148" y="700" fill="#71717a" font-size="11">Risk tier auto-detected from env credentials and write-tool keywords. Edit Mode A (presets) or Mode C (raw JSON).</text>

  <!-- Close button -->
  <g transform="translate(1056,696)">
    <rect width="76" height="30" rx="6" fill="#27272a"/>
    <text x="38" y="20" fill="#fafafa" font-size="12" text-anchor="middle">Close</text>
  </g>
</svg>
