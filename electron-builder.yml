appId: com.vtriot.ccpit
productName: CCPIT
copyright: Copyright © 2026 VTRiot
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md,CONTRIBUTING.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!dev.bat'
  - '!*.lnk'
asarUnpack:
  - resources/**
extraResources:
  - from: resources/splash.html
    to: splash.html
  - from: resources/Logo.png
    to: Logo.png
  - from: golden
    to: golden
win:
  executableName: CCPIT
  icon: build/icon.ico
nsis:
  artifactName: CCPIT-Setup-${version}.${ext}
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  installerLanguages:
    - en_US
    - ja_JP
  displayLanguageSelector: true
  deleteAppDataOnUninstall: false
  runAfterFinish: true
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
